data:
  data_dir: "data/raw"
  image_size: [128, 128]
  train_split: 0.8
  batch_size: 16
  num_workers: 4
  augmentations: true

model:
  name: "unet"
  in_channels: 2
  out_channels: 1
  features: [64, 128, 256, 512]
  dropout: 0.1

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 10
  loss: "bce"
  optimizer: "adam"
  scheduler: "reduce_lr_on_plateau"

evaluation:
  metrics: ["dice", "iou", "precision", "recall"]
  threshold: 0.5

logging:
  log_dir: "logs"
  experiment_name: "biomedical_segmentation"
  save_checkpoints: true
  checkpoint_dir: "checkpoints"
  tensorboard: true
